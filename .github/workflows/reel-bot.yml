name: Reel Bot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of reels"
        required: true
        default: "1"
      upload:
        description: "Upload to social media"
        type: boolean
        default: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install -r requirements.txt
          # Install deno for yt-dlp JS runtime, then yt-dlp
          curl -fsSL https://deno.land/install.sh | sh -s -- -y
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip install yt-dlp
          npm ci

      - name: Decode YouTube token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}" | base64 -d > youtube_token.pickle 2>/dev/null || true
          echo "${{ secrets.CLIENT_SECRET_JSON }}" | base64 -d > client_secret.json 2>/dev/null || true

      - name: Decode Facebook config
        run: |
          echo "${{ secrets.SOCIAL_CONFIG_JSON }}" | base64 -d > social_config.json 2>/dev/null || true

      - name: Create .env
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

      - name: Download music
        run: bash scripts/download-music-gh.sh

      - name: Generate reels
        run: |
          npx tsx src/pipeline.ts ${{ inputs.count || '1' }}
        env:
          BROWSER_EXECUTABLE: /usr/bin/google-chrome
          IMAGE_SOURCE: pexels

      - name: Upload to YouTube & Facebook
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload != false }}
        run: |
          bash scripts/upload-current.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reels
          path: out/*.mp4
